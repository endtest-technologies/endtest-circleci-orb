commands:
    run-tests:
        description: Run Endtest tests and wait for the results.
        parameters:
            api_request:
                description: The Endtest API request used to start the test execution.
                type: string
            app_code:
                default: ENDTEST_APP_CODE
                description: The environment variable containing your Endtest App Code.
                type: env_var_name
            app_id:
                default: ENDTEST_APP_ID
                description: The environment variable containing your Endtest App ID.
                type: env_var_name
            number_of_loops:
                default: 10
                description: Number of polling attempts. Each attempt waits 30 seconds.
                type: integer
        steps:
            - run:
                command: |
                    set -euo pipefail

                    APP_ID="${!ENDTEST_APP_ID_ENV}"
                    APP_CODE="${!ENDTEST_APP_CODE_ENV}"

                    if [ -z "${APP_ID}" ]; then
                      echo "Missing Endtest App ID. Please set ${ENDTEST_APP_ID_ENV} in CircleCI."
                      exit 1
                    fi

                    if [ -z "${APP_CODE}" ]; then
                      echo "Missing Endtest App Code. Please set ${ENDTEST_APP_CODE_ENV} in CircleCI."
                      exit 1
                    fi

                    if [ -z "${ENDTEST_API_REQUEST}" ]; then
                      echo "Missing Endtest API request."
                      exit 1
                    fi

                    echo "Starting Endtest execution..."
                    echo "API request: ${ENDTEST_API_REQUEST}"
                    echo "Polling loops: ${ENDTEST_NUMBER_OF_LOOPS}"

                    # Temporary first version.
                    # This validates and publishes the orb structure.
                    # We will replace this with the real Endtest API call and polling logic next.

                    exit 0
                environment:
                    ENDTEST_API_REQUEST: << parameters.api_request >>
                    ENDTEST_APP_CODE_ENV: << parameters.app_code >>
                    ENDTEST_APP_ID_ENV: << parameters.app_id >>
                    ENDTEST_NUMBER_OF_LOOPS: << parameters.number_of_loops >>
                name: Run Endtest tests
description: |
    Run Endtest end-to-end tests from CircleCI, wait for results, and fail the pipeline when tests fail.
display:
    home_url: https://endtest.io
    source_url: https://github.com/endtest-technologies/endtest-circleci-orb
examples:
    run_tests:
        description: Run Endtest tests from CircleCI.
        usage:
            orbs:
                endtest: endtest/endtest@1.0.0
            version: 2.1
            workflows:
                endtest-tests:
                    jobs:
                        - endtest/run:
                            api_request: YOUR_ENDTEST_API_REQUEST
                            app_code: ENDTEST_APP_CODE
                            app_id: ENDTEST_APP_ID
                            number_of_loops: 10
jobs:
    run:
        description: Run Endtest tests from a CircleCI workflow.
        docker:
            - image: cimg/base:stable
        parameters:
            api_request:
                type: string
            app_code:
                default: ENDTEST_APP_CODE
                type: env_var_name
            app_id:
                default: ENDTEST_APP_ID
                type: env_var_name
            number_of_loops:
                default: 10
                type: integer
        steps:
            - run-tests:
                api_request: << parameters.api_request >>
                app_code: << parameters.app_code >>
                app_id: << parameters.app_id >>
                number_of_loops: << parameters.number_of_loops >>
scripts: {}
version: 2.1

