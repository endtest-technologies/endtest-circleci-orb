commands:
    run-tests:
        description: Run one or more Endtest test executions and wait for the results.
        parameters:
            api_request:
                default: ""
                description: Visible Endtest API request without appId or appCode.
                type: string
            api_request_env_var:
                default: ENDTEST_API_REQUEST
                description: Legacy environment variable containing the complete Endtest API request.
                type: env_var_name
            app_code:
                default: ENDTEST_APP_CODE
                description: Environment variable containing the Endtest App Code.
                type: env_var_name
            app_id:
                default: ENDTEST_APP_ID
                description: Environment variable containing the Endtest App ID.
                type: env_var_name
            number_of_loops:
                default: 10
                description: Maximum number of result checks, performed once every 30 seconds.
                type: integer
        steps:
            - run:
                command: |
                    set -euo pipefail

                    APP_ID="$(printenv "${ENDTEST_APP_ID_ENV}" || true)"
                    APP_CODE="$(printenv "${ENDTEST_APP_CODE_ENV}" || true)"
                    API_REQUEST="${ENDTEST_API_REQUEST_VALUE}"
                    API_REQUEST_SOURCE="parameter"

                    if [ -z "${API_REQUEST}" ]; then
                      API_REQUEST="$(printenv "${ENDTEST_API_REQUEST_ENV}" || true)"
                      API_REQUEST_SOURCE="environment"
                    fi

                    if [ -z "${APP_ID}" ]; then
                      echo "Missing Endtest App ID. Set ${ENDTEST_APP_ID_ENV} in CircleCI."
                      exit 1
                    fi

                    if [ -z "${APP_CODE}" ]; then
                      echo "Missing Endtest App Code. Set ${ENDTEST_APP_CODE_ENV} in CircleCI."
                      exit 1
                    fi

                    if [ -z "${API_REQUEST}" ]; then
                      echo "Missing Endtest API request."
                      echo "Set the api_request parameter or the ${ENDTEST_API_REQUEST_ENV} environment variable."
                      exit 1
                    fi

                    case "${API_REQUEST}" in
                      "https://app.endtest.io/api.php"|"https://app.endtest.io/api.php?"*)
                        ;;
                      *)
                        echo "The Endtest API request must use https://app.endtest.io/api.php."
                        exit 1
                        ;;
                    esac

                    if [ "${API_REQUEST_SOURCE}" = "parameter" ]; then
                      if [[ "${API_REQUEST}" == *"appId="* ]] || [[ "${API_REQUEST}" == *"appCode="* ]]; then
                        echo "Do not include appId or appCode in the api_request parameter."
                        echo "Store them in ENDTEST_APP_ID and ENDTEST_APP_CODE."
                        exit 1
                      fi
                    fi

                    if ! command -v curl >/dev/null 2>&1; then
                      echo "curl is required."
                      exit 1
                    fi

                    if ! command -v jq >/dev/null 2>&1; then
                      echo "jq is required."
                      exit 1
                    fi

                    echo "Starting Endtest execution..."

                    curl_options=(
                      --fail
                      --silent
                      --show-error
                      --location
                      --get
                      --header "Accept: */*"
                    )

                    if [[ "${API_REQUEST}" != *"appId="* ]]; then
                      curl_options+=(--data-urlencode "appId=${APP_ID}")
                    fi

                    if [[ "${API_REQUEST}" != *"appCode="* ]]; then
                      curl_options+=(--data-urlencode "appCode=${APP_CODE}")
                    fi

                    hashes="$(curl "${curl_options[@]}" "${API_REQUEST}")"
                    hashes="$(printf '%s' "${hashes}" | tr -d '[:space:]')"

                    if [ -z "${hashes}" ]; then
                      echo "Endtest did not return an execution hash."
                      exit 1
                    fi

                    IFS=',' read -r -a execution_hashes < <(printf '%s\n' "${hashes}")
                    expected_executions="${#execution_hashes[@]}"

                    for execution_hash in "${execution_hashes[@]}"; do
                      if [ -z "${execution_hash}" ] || ! [[ "${execution_hash}" =~ ^[A-Za-z0-9]+$ ]]; then
                        echo "Endtest returned an invalid execution hash response."
                        exit 1
                      fi
                    done

                    echo "Endtest started ${expected_executions} execution(s)."

                    execution_number=1

                    for execution_hash in "${execution_hashes[@]}"; do
                      echo "Execution ${execution_number} hash: ${execution_hash}"
                      execution_number=$((execution_number + 1))
                    done

                    loop=1

                    while [ "${loop}" -le "${ENDTEST_NUMBER_OF_LOOPS}" ]; do
                      echo "Waiting 30 seconds before result check ${loop}/${ENDTEST_NUMBER_OF_LOOPS}..."
                      sleep 30

                      result="$(curl \
                        --fail \
                        --silent \
                        --show-error \
                        --get \
                        --header "Accept: */*" \
                        --data-urlencode "action=getResults" \
                        --data-urlencode "appId=${APP_ID}" \
                        --data-urlencode "appCode=${APP_CODE}" \
                        --data-urlencode "hash=${hashes}" \
                        --data-urlencode "format=json-light" \
                        "https://app.endtest.io/api.php")"

                      case "${result}" in
                        "Test is still running.")
                          echo "The Endtest execution is still running."
                          ;;

                        "Processing video recording.")
                          echo "Endtest is processing the video recording."
                          ;;

                        "Stopping.")
                          echo "The Endtest execution is stopping."
                          ;;

                        "Erred.")
                          echo "The Endtest execution encountered an error."
                          exit 1
                          ;;

                        "")
                          echo "Endtest returned an empty response. Trying again."
                          ;;

                        *)
                          if ! printf '%s' "${result}" | jq -e . >/dev/null 2>&1; then
                            echo "Endtest returned an unexpected response:"
                            echo "${result}"
                            exit 1
                          fi

                          if ! normalized_result="$(printf '%s' "${result}" | jq -c '
                            if type == "array" then
                              .
                            elif type == "object" then
                              [.]
                            else
                              error("Unsupported results structure")
                            end
                          ')"; then
                            echo "Endtest returned valid JSON in an unsupported format."
                            exit 1
                          fi

                          if ! printf '%s' "${normalized_result}" | jq -e '
                            type == "array" and all(.[]; type == "object")
                          ' >/dev/null 2>&1; then
                            echo "Endtest returned an invalid results structure."
                            exit 1
                          fi

                          completed_executions="$(printf '%s' "${normalized_result}" | jq 'length')"

                          if [ "${completed_executions}" -lt "${expected_executions}" ]; then
                            echo "Received ${completed_executions}/${expected_executions} completed execution result(s)."
                            echo "Waiting for the remaining executions."
                            loop=$((loop + 1))
                            continue
                          fi

                          if [ "${completed_executions}" -gt "${expected_executions}" ]; then
                            echo "Endtest returned more results than execution hashes."
                            exit 1
                          fi

                          if ! printf '%s' "${normalized_result}" | jq -e '
                            all(.[];
                              ((.test_cases // 0) | type == "number") and
                              ((.passed // 0) | type == "number") and
                              ((.failed // 0) | type == "number") and
                              ((.errors // 0) | type == "number")
                            )
                          ' >/dev/null 2>&1; then
                            echo "Endtest returned invalid result counts."
                            exit 1
                          fi

                          execution_index=0

                          while [ "${execution_index}" -lt "${completed_executions}" ]; do
                            execution="$(printf '%s' "${normalized_result}" | jq -c ".[$execution_index]")"
                            execution_number=$((execution_index + 1))
                            execution_hash="${execution_hashes[$execution_index]}"

                            test_suite_name="$(printf '%s' "${execution}" | jq -r '.test_suite_name // "Unknown"')"
                            configuration="$(printf '%s' "${execution}" | jq -r '.configuration // "Unknown"')"
                            test_cases="$(printf '%s' "${execution}" | jq -r '.test_cases // 0')"
                            passed="$(printf '%s' "${execution}" | jq -r '.passed // 0')"
                            failed="$(printf '%s' "${execution}" | jq -r '.failed // 0')"
                            errors="$(printf '%s' "${execution}" | jq -r '.errors // 0')"
                            start_time="$(printf '%s' "${execution}" | jq -r '.start_time // ""')"
                            end_time="$(printf '%s' "${execution}" | jq -r '.end_time // ""')"

                            results_url="https://app.endtest.io/results?hash=${execution_hash}"

                            echo ""
                            echo "Endtest execution ${execution_number}/${completed_executions}"
                            echo "Test Suite: ${test_suite_name}"
                            echo "Configuration: ${configuration}"
                            echo "Test Cases: ${test_cases}"
                            echo "Passed: ${passed}"
                            echo "Failed: ${failed}"
                            echo "Errors: ${errors}"
                            echo "Start Time: ${start_time}"
                            echo "End Time: ${end_time}"
                            echo "Results: ${results_url}"

                            execution_index=$((execution_index + 1))
                          done

                          total_test_cases="$(printf '%s' "${normalized_result}" | jq '[.[].test_cases // 0] | add // 0')"
                          total_passed="$(printf '%s' "${normalized_result}" | jq '[.[].passed // 0] | add // 0')"
                          total_failed="$(printf '%s' "${normalized_result}" | jq '[.[].failed // 0] | add // 0')"
                          total_errors="$(printf '%s' "${normalized_result}" | jq '[.[].errors // 0] | add // 0')"

                          echo ""
                          echo "Endtest summary"
                          echo "Executions: ${completed_executions}"
                          echo "Test Cases: ${total_test_cases}"
                          echo "Passed: ${total_passed}"
                          echo "Failed: ${total_failed}"
                          echo "Errors: ${total_errors}"

                          if [ "${total_failed}" -gt 0 ] || [ "${total_errors}" -gt 0 ]; then
                            echo "Endtest reported failed assertions or execution errors."
                            exit 1
                          fi

                          echo "All Endtest executions passed."
                          exit 0
                          ;;
                      esac

                      loop=$((loop + 1))
                    done

                    echo "The Endtest execution did not finish within the configured polling period."
                    exit 1
                environment:
                    ENDTEST_API_REQUEST_ENV: << parameters.api_request_env_var >>
                    ENDTEST_API_REQUEST_VALUE: << parameters.api_request >>
                    ENDTEST_APP_CODE_ENV: << parameters.app_code >>
                    ENDTEST_APP_ID_ENV: << parameters.app_id >>
                    ENDTEST_NUMBER_OF_LOOPS: << parameters.number_of_loops >>
                name: Run Endtest tests
description: |
    Run Endtest end-to-end tests from CircleCI, wait for results, and fail the pipeline when tests fail.
display:
    home_url: https://endtest.io
    source_url: https://github.com/endtest-technologies/endtest-circleci-orb
examples:
    run_tests:
        description: Run Endtest tests and fail the workflow when any execution fails.
        usage:
            orbs:
                endtest: endtest/endtest@0.0.2
            version: 2.1
            workflows:
                endtest-tests:
                    jobs:
                        - endtest/run:
                            api_request: https://app.endtest.io/api.php?action=runWeb&label=Critical&platform=windows&os=windows11&browser=chrome&browserVersion=latest&resolution=1280x1024&geolocation=sanfrancisco&cases=all&notes=
                            app_code: ENDTEST_APP_CODE
                            app_id: ENDTEST_APP_ID
                            number_of_loops: 10
jobs:
    run:
        description: Run Endtest tests from a CircleCI workflow.
        docker:
            - image: cimg/base:stable
        parameters:
            api_request:
                default: ""
                description: Visible Endtest API request without appId or appCode.
                type: string
            api_request_env_var:
                default: ENDTEST_API_REQUEST
                description: Legacy environment variable containing the complete Endtest API request.
                type: env_var_name
            app_code:
                default: ENDTEST_APP_CODE
                description: Environment variable containing the Endtest App Code.
                type: env_var_name
            app_id:
                default: ENDTEST_APP_ID
                description: Environment variable containing the Endtest App ID.
                type: env_var_name
            number_of_loops:
                default: 10
                description: Maximum number of result checks.
                type: integer
        steps:
            - run:
                command: |
                    if ! command -v jq >/dev/null 2>&1; then
                      sudo apt-get update
                      sudo apt-get install -y jq
                    fi
                name: Install Endtest dependencies
            - run-tests:
                api_request: << parameters.api_request >>
                api_request_env_var: << parameters.api_request_env_var >>
                app_code: << parameters.app_code >>
                app_id: << parameters.app_id >>
                number_of_loops: << parameters.number_of_loops >>
scripts: {}
version: 2.1

