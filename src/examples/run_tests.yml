description: Run Endtest tests and fail the workflow when the execution fails.

usage:
  version: 2.1

  orbs:
    endtest: endtest/endtest@0.0.1

  workflows:
    endtest-tests:
      jobs:
        - endtest/run:
            app_id: ENDTEST_APP_ID
            app_code: ENDTEST_APP_CODE
            api_request: ENDTEST_API_REQUEST
            number_of_loops: 10
